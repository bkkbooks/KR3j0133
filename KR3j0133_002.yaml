body:
  text: 書齊夜話卷二元俞琰撰張橫渠曰人多以老成則不肻下問故終身不知又為人以道義先覺處之不肻復謂有所不知故亦不肻下問遂生百端欺妄之心人我寧終身不知豫於至元丁丑冬毗陵道中邂逅文純心同航間話咸淳間時文因語余曰卿為麗澤書院山長試諸生以經疑云宣王中興之賢主平王東周之始王詩記宣王而不紀平王書紀平王而不紀宣王何也豫對曰詩書刪定皆出於夫子之筆詩既載宣王矣不必又載之書也書既載平王矣不必又載之詩也猶易之六爻一言初則知上為終何必復言終六言上則知初為下何必復言下純心以為然又言利貞者性情也孰為性孰為情豫率爾對曰是利而貞情復乎性純心微笑曰未也豫是時年少倔强自以為是遂不叩其詳未免耿耿于懷十餘年矣厯考諸儒易解乃得其說蓋元亨利貞四字文王本意只是大亨而利于正夫子分為四德以象四時則元乃動之始亨乃動之極利乃靜之始貞乃靜之極靜極則復動貞盡則又元乾道之所生也生不窮也此也向使夫子不曰性情而曰情性則是利而貞自動而靜謂之情復乎性亦可今不曰情性而特曰性情蓋發明貞下起元靜中有動四時循環終而復始之義若但情復乎性則終於貞而不元靜而不動生意或幾乎熄矣豈易之㫖哉嗚呼年少而倔强矣而不思問是自誤也戒之戒之純心蜀人本心樞相之弟大衍之數五十其用四十有九談者紛紛朱漢上業說備言之矣先儒皆謂虛一不用以存太極之本體誠是已其用四十有九則自秦漢至宋濓洛諸君子及乾淳諸公並無至論何也豫嘗遊鄱陽見一書乃臨江黎氏所著其說曰太極一也太極生兩儀陽一陰二衍而三也兩儀生四象太陽一少陰二少陽三太陽四衍而十也四象生八卦乾一兌二離三震四巽五坎六艮七坤八衍而三十六也通太極兩儀四象八卦之數衍而五十也蓍注合合五十而為一虛一而用四十九虛一者太極體數也用四十九者所以生六十四卦極天地萬物之數盡天下之變也黎公名立武咸淳戊辰廷試第二名及第至元癸未秋豫與新安王太古同宿商巖夫道院聽其說易儘有好處如改正先天方圖移西北乾一置于東南而十二辟卦皆正此一改極有理但陽虛陰實之說未免為或者所譏譏之者豈其所學過太古哉女無媺惡入宫見妬士無賢不肖入朝見嫉昔者揚子雲作太𤣥經張衡以為是劉歆以為非從古如斯何况于今我輩當今之時閉門讀書談天地論古今如觀嶺上白雲只可自怡悅而已太古乃以易說進呈幾乎得罪蓋以其說反先儒也賴有識者回護不然危矣太古遂以此憤悶而死惜哉伏羲時不有文字始因洛書河圖之文以畫卦故曰河出圖洛出書聖人則之又曰仰則觀象于天俯則觀法于地觀鳥獸之文與地之宜近取諸身遠取諸物於是始作八卦蓋不特取法于河圖洛書二物而已劉向父子班固輩皆循孔安國之謬以為河圖授羲洛書錫禹如此則伏羲時止有河圖而無洛書也夫孔子以圖書並言而安國之徒乃岐而二之何昉哉河圖之說自易之外吾於論語禮運見之矣洛書之說自易之外它經無所見也按禹貢但言導洛不曽言出書果有書則禹孔言之矣孔安國注洪範乃為洛書者禹治水時神龜負文而列於背有數至九禹遂因而第之以成九疇吁以洪範之九疇認為洛書則中庸之九經亦可以為洛書矣何其謬哉關朗以五十五為河圖四十五為洛書亦循安國之謬劉牧又兩易之以謬攻謬耳天一至地十凡五十五此五行生成數也蓋孔子未嘗指此為河圖洛書戴九履一之數凡四十五蘇東坡斷之曰非易數也實是緯書九宫之數耳子華子言之大戴孔言之乾鑿度言之張衡言之彼亦未嘗指此為河圖洛書太極圖五行下一圈注云乾道成男坤道成女又下一圈注云萬物化生此男女謂乾坤所生六子乃日月雷風山澤非人之男女也若以為人之男女則人之男女僅能生人豈能生萬物也哉周濓溪太極圖說云無極之真二五之精妙合而凝乾道成男坤道成女二氣交感化生萬物萬物化生而變化無窮焉此循序而言也遡而言之則曰一陰陽也陰陽一太極也太極本無極也始則無極終則無窮故下舉易以結之曰原始反終故知生死之說大哉易也斯其至矣篇首一句以無極太極並言終篇則以無窮與無極對說辭意前後甚貫穿人能原始而知所以生反終而知所以死則知周子之所謂無極無窮矣今人論太極圖說但看無極而太極兩箇極字竟不問無極無窮兩箇無字何耶邵康節曰天依形地附氣其形也有涯其氣也無涯愚謂論理則濓溪無極無窮之說最好論氣形則康節無涯有涯之說亦好合理與氣形並言斯明備矣漢張衡曰八極之維位二億二萬二千三百里南北則短减千里東西則廣博千里自地至天半於八極則地之深亦如之通而度之則是渾已將覆其數用重鉤股懸天之景薄地之義皆移千里而差一寸得之過此以往未之或知也未之或知者宇宙之謂也張衡蓋以天之在上為宇地之在下為宙尸子則曰天地四方曰宇往古來今曰宙淮南子亦曰上下四方曰宇往古來今曰宙余以俯仰之間言之地居天之中央地之上皆天也仰觀之則蒼蒼無極地之下亦天也俯察之則窈窈無窮四表皆然是之謂宇以既往未來言之則自昨前日去年前年十年百年千年千古萬年萬萬古浩浩無極自明日後日明年後年十年百年千年千世萬年萬萬世綿綿無窮是之謂宙夫人之生也寓形宇內宇內之事可得而見之者且不能儘曉何况自天地開闢萬萬古以至如今巧厯所不能算又焉能究極其始哉既不能究極其始而欲窮竟其終厥亦難矣春秋緯謂開闢至獲麟凡三百二十七萬六千歲吾固未之信若邵康節十二萬九千六百年之數吾亦未敢以為然也先儒謂天開於子地闢于丑人生于寅故斗柄建此三辰皆可以為歲首而三代迭用之愚謂堯舜禹三聖相授守一道故皆以寅月為歲首湯黜夏命故不用寅而攙先一月用丑周革殷命故不用丑而攙先一月用子不過定一代之制而於是月受羣臣之朝賀所以新天下之耳目覘人心之從違耳秦之繼周朝㑹不用子而用亥豈有他哉是攙先一月而已不然何以寅而丑丑而子子而亥耶唐子西常闢三統之說矣然不究古人所以改正朔易服色之本意但力辨殷亦用寅而不用丑蓋謂建子尚有謂建丑實無謂耶不思秦建亥是又何謂耶漢高祖承秦之制而不改正朔至武帝建太初厯始用寅月為歲首新莽曹魏明帝皆嘗建丑矣未幾而復建寅唐太宗亦嘗建子矣未幾而復建寅愚謂三代歲首惟夏遵堯厯為正若子若丑若亥四時皆不正此孔子顔子所以皆有取於夏時也二十四氣之名義鄱陽洪氏有說齊節初衍而正之云十月純陰屬坤非無陽也陽生於其中故謂之陽月自小雪積至大雪則已滿十五分矣老陰始怒欲拒其來故氷堅地坼易曰龍戰于野其血𤣥黃正此時也逮冬至則陽已戰勝而復矣小寒十二月節寒則陰慘矣不在十月之前而在十一月之後者陰陽進退各六位象卦之六畫下二畫地位中二畫人位上二畫天位陽長於下陰為所迫漸出地上所以為寒故臨之二陽長才及半則曰小寒臨之二陽體已完則曰大寒醫書言寒脉洪大陽在內故也春蠶也蠶蟄蟲始振也義立謂太史奉天子命而立之厯也立夏立秋立冬亦然雨水之雨與詩雨我公田之雨同當讀為去聲前或雨雪雨霰天地既泰則雨而已古厯于雨水驚蟄易次非也合從今厯月令於二月言雷乃發聲蟄蟲啓戶驚蟄之謂也春分與秋分皆以晝夜長短通平而得名清明三月節屬大壯則五陽盛矣天地間陰氣消且盡安得不清且明哉故晉人亦於三月言天朗氣清榖雨之雨亦讀為去聲謂農播百榖如雨之雨於空中也夏假也假大也猶書言滿假崇丘言萬物之高大是也立夏四月節六陽以極易乾上九爻傳曰盈不可久謂其滿也陽言小滿猶陰言小雪小雪陰極而陽初生小滿陽極而陰初生漢時以芒種為大滿後世厯者改之戒其亢也芒種五月節種從去聲讀老農云秧根過芒種生數輒倍子固種之所以芒也周禮稻人草澤種以芒種從上聲讀謂種之芒者稻麥之類也與此異之極也堯典云日永日短夏景晝六十刻冬景晝四十刻蓋永與之極也暑生於陽之燥醫書云人暑脉微弱陰在內故也小暑大暑義如小寒大寒觀彼可以知此彼屬臨此屬遁也秋揫也揫欲也萬物皆收斂就實故堯典言西成六月為伏稚金畏火之炎而伏也立秋則金氣伸矣此火之所以返其故處也天地間無兩大之理昔也金伏今也火伏理固然爾張行成曰母生處即是子生處未為中央土土生金而水以肇矣火安得不病易言坤正立秋後也致如致事之致亦處暑之義坤土生金至秋則旺金白故露亦白易曰巽為白巽入也又為風風入露為霜入雨為雪入水為氷其色皆白本于金也四時皆有露獨秋稱白主金明矣氣冽曰寒陰伏地下為寒泉陰浮地下為寒露詩云白露為霜寒所至月令霜始降乃命有司曰寒氣總至民力不堪然則霜降以寒爾冬終也故終字之半為冬冬言藏終也立冬十月節小雪十月終是時天將雨雪而未至乎大水始氷而壯地始凍而坼較之十一月大雪則有間矣節初名夢龍鄱陽人登咸淳戊辰第十月小雪而言小春何也曰此易十月為陽之義是時霜晴日暖則桃杏發榮亦有春色故謂之小春者也書齊夜話卷二
