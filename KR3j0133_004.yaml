front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3j0133_WYG_004-1a, image: WYG0865/WYG0865-0628c.png}
body:
  text: 書齋夜話卷四元俞琰撰桓談少好文見揚子雲工賦頌欲從學子雲曰能讀千賦則善之矣董遇曰讀書百遍其意自見愚謂少年時果能如董遇所云則聖經之義何患乎不通果能如揚子雲所云則為文何患乎不工管子云思之思之又重思之思之不通鬼神將通非鬼神之力也精誠之極也豫矻矻三十年周易集説方脫藁初十年自以為了次十年心目俱亂後十年黑白始分思之力也其初未嘗不思思之不審耳先儒作文皆有所本六經是也試略舉東坡之文言之如祭統云天子有善讓德於天諸侯有善歸之天子東坡喜雨亭記乃云太守不有歸之天子天子不有歸之太虛其説蓋本祭統又樂記云夫物之感人無窮而人之好惡無節則是物至而人化物也東坡王君寶繪堂記乃云君子可以寓意於物而不可以留於物其説蓋本樂記有學詩於黃山谷者山谷云公治何經且熟讀經書其人未逹退而問人有答之者云不明經旨則不識是非不知輕重何以為詩李挺之云邵康節云科舉之外有義理之學義理之外有物理之學物理之外有性命之學程伊川曰古之學者三異端不與焉一曰文章之學二曰訓詁之學三曰儒者之學蓋文章之學即科舉之學訓詁之學即義理物理之學儒者之學即性命之學性命為上物理義理次之科舉之學末也學吟詩又其末也張子韶云學者專意時文不知研窮經史則舉業之外叩之空空如也亦可耻也前輩久不以古今灌溉胸中試引鏡自照面目必可憎對人言語無味謂此也愚謂幼習科舉之學十六歲而三場粗通輒應咸淳癸酉鄉貢進士舉嘗手編省監時文效選賦格前韻編造句幹意後兩韻與論策皆編立説主意并字面乃今思之儷花鬭葉破碎大道雕蟲篆刻小技而已然當時以此取士為士者蓋不得不然也哉三場時文雖拘以格律然亦套括之學耳其功全是編節猶記作勸學講義如何論破題云吾儒分內之事而致勤上之人勉焉亦可以自愧矣蓋倣上詳孝宣舉亷得真其破題云以士夫律己之常而致勤人主之責實可以觀世變矣豫用其主意用其字面不用其句法鄉先生陳通齋云子之文何其妥且熟也豫以實對通齋云一年編可敵十年讀書功夫近日學者無所用心皆學唐詩等語生徒云欲工唐律須編唐人諸家詩茍能觸類而長之當有脫胎換骨之妙如四六之學亦然不然不能進也司馬溫公自言不善四六或謂其倦於屬對非也四六獻諛失實故溫公不肯為也屬對雖小技然亦不昜如三才天地人四詩風雅頌四時春夏秋冬三德剛柔正直迅雷風烈烈風雷雨絶地天通通天地人夫子天尊大士頭上不同官家宦者宫人身中各别皆以為巧對又如劉蕡下第我輩何慚雍齒且封吾屬無患勸君更盡一杯酒與汝同消萬古愁娶妻不用求良媒書中有女顔如玉有名何在鐫頑石路上行人口是碑古今未嘗無對但我輩讀書不多尋思不到爾至如街談巷語亦莫不有對良將手下無弱兵死人身邊有活鬼老手舊胳膊窮嘴餓舌頭胡猻入布袋鮎魚上竹竿皆巧對也駢四儷六抽黃對白自是一家之學向之習舉業者皆不暇及此然有時乎應用則又有不學容不為之豫於元貞乙未自吳江回復入王本齋書院有一啓劄謝本齋之叔中齋宣慰起聯云揀盡寒枝常歎秋鴻之獨往還尋故壘何如來燕之相依本齋姊夫黃春谷語云子嘗謂不善四六此聯並用古詞語而又切當何也豫對生平於此甚疏偶然有此聯耳蓋實説也小女許束敬齋總管之侄豫回敬齋禮書云喬木森森憩園林之如舊夭桃灼灼喜男女之及時句雖不工束氏所居乃豫故廬也因以語生徒云大抵應用之文須是切當雖工亦奚以為作詩亦然唐人鷺詩中間兩聯云立當青草人先見行傍白蓮魚不知兩足獨拳寒雨裏數聲相呌晚秋時雖掩其題目皆知其為咏鷺豫疑秋字當作煙字尤切當蓋相失於晚煙中是以相呌若晚秋相呌則無意味矣嘗記詩壘元戎云尋常一樣垂楊栁種入宮墻自不同杜北山變之則為尋常一樣窗前月才有梅花便不同孔方平云楊栁不遮春色斷一枝紅杏出墻來又如朱希貞曰佳人不奈冷重疊著春衣僧北澗云漁翁不奈冷重沓著簔衣後作皆響於前作杜少陵詩云夜闌更秉燭相對如夢寐晏小山之詞乃云今宵剩把銀缸照猶恐相逢是夢中談者但稱晏詞之美不知其出於杜詩也文子云所以亡社稷身死人手為天下笑者未嘗非欲也賈誼過秦論末句蓋用文子語京房後之視今猶今之視前也王羲之蘭亭詩序蓋用京房語又如絲竹管絃四字陳遁齋謂其重復蓋亦用漢書語張雨傳云後堂理絲竹管絃他如死生亦大矣放浪形骸之外齊彭殤為妄作皆莊子語黃山谷云凡為文字作語最難老杜作詩退之作文無一字無來處蓋後人讀書少故謂韓杜自作此語爾古人之能為文者真能陶冶萬物雖取古人之陳言入于翰墨如靈丹一粒點鐵成金也范文正公虀賦中間一聨云陶家甕裏釀成碧緑青黃措大口中嚼出宫商徴羽豫幼作海􅀈賦詩云生以蝦為目來從水母宫堆槃凝凍結停筯便消融瑩潔玻璃白㻞瓓瑪瑙紅酒邊嘗此味牙頰響秋風句雖粗率響字蓋從范文正公虀賦中來毗陵向簡齋諱公桂咸淳末為無錫宰酒酣即雜咏上庠乾為圓賦送聨云惟其不圓乃所以見其圓安得圓機而與語至元戊寅長洲縣學試儒遊六經道最高賦簡齋代其子作一篇懷其卷問豫云汝第二韻押甚麼字豫對曰押最字云道非百氏之侔高惟此最蓋用上庠乾天下之至健押至之格又問第四韻如何形容最高豫對曰非天之天不可階而升非墻之牆得其門者寡美難幾及誰居孟氏之鄰登必自卑皆出子思之下又問第七第八如何發意豫對曰第七句徼云此道學愈高厯更世道之萬變蓋人心之中自有聖人之六經蓋倣上庠六經統天地之心第七韻發意第八韻送聯云惟其不自高所以見其最高深造六經之道閫蓋依叔丈酒邊見教乾為圓之格簡齋撫豫背云可惜可惜早生數年定當博青衫豫亦自謂我生不辰惟有長吟老杜詞賦工無益之句亦浩嘆耳窮措大常談云詩文熟便著緑猶漢儒明經取朱紫然有一生勤苦而無成名者是有命焉不可幸而致也或疑兩人共試而甲之文工於乙反被黜乙之文不如甲反中選何也殊不知考試官每房分若干卷限定各取幾名甲所以被黜者文雖工更有高於甲者蓋分於某房衆好卷之中也乙之文雖不如甲幸而分於某房無好卷之中未免短中求長是以中選甲勝於乙而被黜乙不如甲而中選茲非命也歟先師紀梅臞先生赴咸淳庚午舉自謂必中選而謄録所失其第三場及揭榜後拆席屋有一卷插於笆辮間乃其第三場䇿卷也劉之傑赴省第三場策已寫第一道俄而腹疼挾卷奏厠插卷於厠屈出則徑行不記取卷復回尋之則無矣及揭榜後乃登第後纍遷置制使有邑宰以公事稽緩追至庭下邑宰白云昔者濫登末第幸與公同年輒有一語奉告稟公曰得非省闈中事乎曰然乃延入屏後問其故對曰因奏厠見策卷欠第二第三遂拙作補足而納之公曰某一生仕宦皆所賜公何不早見訪語其故遂呼妻子羅拜堂下而語之云生我者父母成我者公也於是厚報邑宰豫向見先輩云爾不記邑宰姓名里人陸蘭坡名逸長豫一歲論咸淳末郡庠月試陸之論每居豫前豫之賦每居陸前是時教官乃三山董先生名師謙咸淳辛未别省院試賦魁也陸謂豫云子之論自冒頭題下講腹至結尾必作四假我則一片成文俾董公畫斷不得豫亦云子之賦是原韻至八韻皆用賦體我則不用皆弄巧也豫嘗對蘭坡至論縝密吾不如子蘭坡云賦工緻吾不如子彼此皆相觀而善自科舉之學廢後生晚進之學皆矜已傲物吟數句詩便以為髙於李杜寫數行字便以為過于羲獻是可笑也亦可憐也笑之者何笑其小器易盈也憐之者何憐其未聞君子之大道也昔在林屋山中寄橘入城與先師紀先生問月試拆榜如何先生答云策第九名則亦在前列雖小試亦見斯文之驗也更免旃則不患不成豫是時方年十八雖擾攘間未嘗一日輟筆後三十年偶閲故篋見先生手帖遂裝成小軸孟能靜于曉山蒲梅月心諸公皆有題跋梅自今又為古人矣豫近年假館江村離羣索居獨學無友惟以易説自娛屈指城中先輩能有幾人良可為之嘆息至元間嘗為道友作玄牝之門賦晦朔之間如何論對策問丹經之疑雖文場掃地之餘聊作此丹學之三場以見窮措大疇昔燈忩刻苦之末技爾連江術者林復齋抄豫賦嚴呈何潛齋終篇潛齋批點與一道者後數年蜀人向玉忩自湖南回吳云潭州見一道誦子之賦矣問其全篇何在乃祕因以為奇貨可笑可笑愚曰近在饒州時有紫極宫道士取豫此賦豫即手書以贈之彼亦見示一賦忘其作者姓氏朋友問聞一好説話得一好文字彼此而相與亦是樂處吾知潭州道者必無此樂也或謂朱晦庵云有朋自遠方來不亦樂乎程子以為以善及人而信從者衆故樂何謂以善及人晦庵答曰如傳得師友説如好説話得好文字歸好與朋友亦喚及人如有好説話得好文字緊緊藏在籠篋中如何做得及人愚謂近來有一等朋友見人有好朋友見人有好文字必設計取之乃名自已聞得些善言則緘默而不肻語人寫得些好文字則藏而不肻示人鄙哉誠可惡也豫幼愛雜覽聞朋友間有奇書必告借抄録以至忘寢食而成疾忽一日先師語先人書封鎖其書厨留經史與先儒性理之書省鑑時文在外自此不敢雜覽惟專心舉業業成而時異事殊平日勤苦竟為畫餅因思對漢武帝先帝好老而臣尚少陛下好少而臣已老時不我逢奈之何哉德祐喪之餘我輩無所用心但閉門靜坐讀易而已近邂追黃淵道間話月試題出天地數五豫不覺技癢遂破云理寓乎數陽奇者天地有五以合也位相參於自然再破云數焉有十五為陽五者為陰兩而配諸一則曰天一則曰地淵道曰諸卷並無此作蓋天數五地數五凡兩五以為一十五則非易之旨也易題最難下筆其造語用事自是一樣格調非知易而精於賦者不能也文章天下之公器安可誣哉因語安道曰豫自此賦絶筆矣徒費思作此無用之文不若留氣以暖臍也淵道曰選場開則有用矣豫笑曰何代無美錦繡但恐從來花樣不同翻謄别有新置有如我輩陳人之陳言決不復用矣淵道亦以為然淵道閩人也今亡已竊謂義熙遺老貞元朝士一日無一日至元間學官如淵道者今亦落落如晨星之稀悲夫書齋夜話卷四
