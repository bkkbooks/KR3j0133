body:
  text: 書齋夜話卷一元俞琰撰經傳字多舛誤如三歎作三嗅己亥作三豕三之作言旡作之害割為周烏焉成馬何可勝數今姑舉其略禮記字舛誤最多吉為告先為天九原為九京滹沱為惡池奠徹為填池笄纚為雞斯大學云見賢而不能舉舉而不能先命也鄭氏注以命為慢朱晦菴以命為怠慢與命聲相近而訛也怠與命字相近而訛也論語云南人有言曰人而無恆不可以作巫醫禮記緇衣云南人有言曰人而無恆不可以作卜筮巫與筮字之訛也醫與筮聲之訛也書云其在髙宗時作其即位乃或亮隂三年不言其惟不言言乃雍禮記檀弓云子張問曰書云高宗三年不言言乃歡歡字之訛也易云不耕穫不災畬旡凶字記云不耕穫不災畬凶有凶字無凶字者是有凶字者非論語云鄉人儺朝服而立于阼階作儺字者是記云鄉人裼朝服而立於阼階裼字者非樂記云易直子諒韓詩外傳云易直慈良非韓詩外傳則不知子諒之為慈良也論語云加我數年司馬氏史記云假我數年非史記則不知加我為假我也易云直其正也方其義也記乃云直其政方其義以易下文君子敬以直內義以方外正之即是敬字敬訛為政政又轉為正記云體旡咎言記乃云履旡咎言以金縢公曰體王其罔害證之即是體字體訛為禮又轉而為履也禮記云庶人之摯匹鄭氏注云説者以匹為鶩釋文云依注作鶩音木鴨愚按周禮大宗伯六摯庶人執鶩則鄭氏以匹為鶩無疑矣以此推之則孟子所謂力不能勝一匹雛亦當為鶩雛周禮大司冦以兩劑禁民獄入鈞金三日乃止於朝然後聽之夫一鈞重三十斤貧者安得有三十斤之金鈞字當作鉤字之訛爾鉤金即孟子一鉤金之謂蓋鉤金乃帶鉤之金也周禮司烜氏掌以夫燧取明火于日鄭氏注云夫燧陽燧也釋文云夫方符反愚謂夫字當作木字內則有金燧木燧鄭氏注云金燧取火于日木燧鑽火也周禮醢人箈菹鴈醢筍菹魚醢鄭氏注云箈箭萌與箈同愚謂箭萌即竹萌乃筍也箈當作菭從草不從竹當與箈字同即今之海苔也苔菹而鴈醢筍䈌而魚醢各以時物為偶既有筍菹豈可又以菭為箭萌禮器云束帛加璧尊德也謂尊貴其德郊特牲云束帛加璧往德也往字疑是旌字謂旌表其德或曰尊亦當作旌尊與旌聲相近也往與旌字相近也棺入土曰窆陵驗切土曰壟曰封方容切喪大記云几封用綍鄭氏注云封周禮作之窆窆下棺也此窆或皆作斂檀弓曰般謂以機封謂之斂然則棺之入坎為斂與斂尸相似愚謂記中言封多是窆字乃若馬鬛封之封却是如字與易不封樹之封同矣檀弓云縣棺而封鄭氏注云封當作窆窆下棺也春秋作崩愚謂鄭氏以封為窆誠是以證已春秋之塴則非也釋文云封依注作窆彼驗反亦是己以為彼驗反則非也彼驗當作陂驗乃何切徐氏甫鄧反則又謬矣塴與窆義相近而音不同春秋昭公十二年葬鄭簡公左氏傳云日中而塴杜預注云塴下棺釋文云塴北鄭反禮家作窆徐驗反愚謂義同有音切有韻北鄭反則成音韻而可切彼驗反則不成音韻而不可切徐驗反則漸成音矣或曰窆字從穴鄭氏謂棺入坎是已塴字從土從崩當是既下棺而掩之以土也杜預以塴為下棺非也德明以塴為窆亦非也詩經天保云俾爾單厚鄭氏箋云單厚也釋文又音丹昊天有成命云單厥心亦當音丹謂盡其心矣毛公訓單為厚鄭氏箋云厚其心釋文乃音都但反德明蓋承康成之誤康成蓋承毛公之誤詩楚茨云先祖是皇神保是饗楚詞云思靈兮賢姱靈保即神保也朱晦菴詩傳謂神保是鬼神之嘉號或問云既説先祖又説神保似語義重復晦菴所云近見洪慶善説靈保是巫今詩中不説巫當便是尸却是向來解錯了此兩字余謂今之巫者言神巫其體蓋猶古之尸故南方俚俗稱巫為大保又呼為師人師字即是尸字師與尸聲相近也父之父生曰大父死曰祖祖者始也本也祖之為言狙也死則稱祖未死而祖宜歟朽生出東漢魏伯陽參同契腐生出桓常紀朽與腐皆言其年老而形容其枯稿也蒼生出書益稷注以為草木蒼蒼然出山濤謂王衍誤天下蒼生盧同云百萬億蒼生命則謂人為蒼生漢書云蒼頭謂小僮剃髮則其頭青色也今稱老者為老蒼謂其蒼頭如艾色也乃若少女為少艾則謬矣豈有少年女面色乃如蒼艾也哉孟子云人少則慕父母知好色則慕少艾上少字去聲下少字上聲謂幼少則戀父母之心甚切長則情竇開知好美色而慕戀之心少衰也荀子云妻子具而愛衰於親與此同旨趙岐注孟子乃以美好誤矣詩庭燎云夜未艾毛詩訓久閟宫云俾爾耆而艾艾豭皆訓老未聞訓以美好也楚辭云竦長劍兮擁少艾注云長艾也猶言少長也亦不以幼艾為女子之美好或謂兩少字皆去聲艾字恐是女字之訛耳豈其然乎不若證以荀子之説為長矣列子莊子鯤鵬之鵬即古篆􅀈鳳字説文云古文鳳象形鳳飛羣鳥從萬數故以為朋黨字愚按爾雅釋鳥有鳳無鵬字又按楚詞云尺澤之鯢豈能與鯤魚量江海之大藩籬之鷃豈能與鳳凰料天地之高哉楚辭與列莊皆鳳對鯤而言老子云域中有四大而王處其一焉道大天大地大王大王字當作人字下文云人法地地法天天法道道法自然按祭義云天之所生地之所養無人為大謂無如人之大也此以證之則老子謂人亦大是已無錫尤氏老氏釋音謂河上公注以人為王古本王作人字罪即古罪字秦始王罪字象皇字乃改罪為罪古對字從口漢文帝以言多為非誠乃去口從土古疉字從三日新室以三日太盛乃改三日作三田隋乃改隨字隨漢東之國也隨文帝以周齊不遑寧處故去之作隋以之為走故也武則天諱曌即照也􅚷即騧字宋明帝以騧象禍字乃改騧為􅚷唐太宗有馬拳毛􅚷詩美目盼兮之昐匹莧切孟子盻然之盻説文作五禮反佩觹集作不計反或讀盻為盼誤矣書云惟斆學半盤庚斆于民孔氏皆訓斆為教禮記學世子學士春夏學干戈秋冬學羽籥之類並戶教反教也與學字通用書云亂而敬又云亂臣十人亂乃治也詩云薄汙我私汙潔也書云擾而毅禮云擾萬民左氏傳云擾龍氏擾乃順也孟子云深耕易耨易乃治田而為力艱也論語曰喪與其易也寧戚易乃治喪而為力艱也易字疑是具字按檀弓云喪具君子恥具具俱易蓋相似也又按檀弓云與其哀不具而禮有餘也不若禮不足而哀有餘也亦與此同旨耳書云若之何其詩云夜如何其記云何居其居皆音箕語助也經傳之結以與字即是歟字耳即而已爾即如是諸即之乎兩聲合為一聲蓋省文也孟子云景子曰禮曰父召無諾君命召不俟駕固將朝也聞王命而遂不果宜與夫禮若不相似然愚謂與音歟古者歟字皆作與字如禮與何如是也宜與即何乎之類當以與字絶句不當連下文朱晦庵曰王介甫點書如矧惟若疇圻父薄違農父若保宏父定辟古注從父字絶句介甫則就違保辟絶句敻出諸儒之表東坡解吕刑王享國百年耄作一句荒度作刑作一句甚有理又曰禮記方馬二解儘有好處如君賜衣服服以拜賜絶句以辟之勤大命施于丞彛鼎舊點以辟之為句極無義禮辟乃君也以君之命銘彛鼎是檀弓云季康子之母死般請機封公肩假曰般爾以人之母嘗巧則豈不得以其母以嘗巧者乎公輸般魯人之伎巧者也欲設機以下棺公肩假責之曰爾以他人之母試爾之伎何不自以汝之母自試其巧乎語意甚明鄭氏乃以豈不得以句點又以以字為已字母字音無誤矣近見方慤禮記解豫説正與之合因語生徒云意到理到異世而同符微方氏則豫為臆脫矣方慤正和時人也儒行云今衆之命儒也妄常以儒相詬蓋言當時衆人之所謂儒乃妄名為儒非真儒也劉子云魯人縫掖實非儒行愚謂既非儒行故常以儒招戲真儒如孔子則莫之敢戲愚論如此及讀方氏解亦如此當依方氏從妄字句點鄭氏連常字為句誤矣哉論語云富與貴是人之所欲也不以其道得之不處也貧與賤是人之所惡也不以其道得之不去也當就不以其道點如説之不以道亦當就道點夫富貴貧賤是人所欲所惡也處富貴而不以其道則吾之得富貴也寧捨之不處也貧賤而不以其道則吾之得貧賤也寧受之不去也然則得富貴何以處富貴必以其道也得貧賤者何以去貧賤亦必以其道也若就不以其道得之點則富貴固有以其道得之者亦有不以其道得之者若貧賤則安有以其道得之者哉大抵如生于公侯家素富貴是以其道而得之生于閭閻之中而素貧賤亦豈不以其道得之不以其道不以其道蓋謂處富貴去貧賤不以其道非謂得富貴得貧賤不以其道也猶記至元庚寅秋雨雲間衛山齊夜話及此山齊之論亦然中庸云君子之道費而隱朱晦庵注云費用之廣也愚謂費字當作府味反乃費用之費與注意合今作符味反則符味反兩字母子相同而切成味字與注意不合矣以府為符此乃傳寫之訛爾大學云厭然掩其不善而著其善鄭氏注云厭讀為厭靨閉藏貌愚謂厭字當作入聲于葉反藏伏也乃與注意合鄭氏讀厭為靨恐則是靨字於葉反訛而為壓也不然古者黶靨通亦不可知按荀子所謂厭然一涉反詩厭浥行露之厭亦作入聲俚謂語厭羞藏厭皆是入聲曽子曰吾日三省吾身三如字下文云為人謀而不忠乎與朋友交而不信乎傳不習乎曽子每日以三者省察其身也與季文子三思而後行之三不同中庸云宗廟之禮所以序昭穆也晉諱昭故以昭音為韶朱晦庵經解並如字舜典正月上日正音政秦始皇名政遂以正為征喪記云子夏喪其子孔氏不喪出母孝經云孝子之喪親也不過三年喪字皆當作平聲詩云不我過論語曰過位色勃如也又云楚狂接輿歌而過孔子孟子云禹三過其門而不入又云過我門而不入我室皆經過之過當作平聲莆陽鄭氏曰尚書秦之官名也今之謂亦尚書至今秦人謂尚為常此聲之異古今不變也經書中慶字皆作平聲韻觀詩可見易坤卦彖傳與諸卦爻傳皆然周易爻傳皆叶韻坤六三以時發也叶知光大也愼不害也發字作去聲詩云飄風發發與害字叶亦去聲蒙六四獨逺實也實字作去聲叶順字巽字未濟初六亦不知極也極字作去聲叶正字或改正字作直字以叶極字非也關雎序告於神明之告釋文古毒反其餘告字無音非無音也音其一以例其餘耳如葛覃言告師氏小旻不我告猶四月維以告哀十月之交日月告凶楚茨工祝致告江漢告厥于王泮水不告于訩抑告之話言大東以告病焉讀者皆作去聲考槃永矢弗告之告作入聲何也曰皆去聲也北音陸軸宿其實皆是去聲叶告字南音則以陸軸宿作入聲遂以告字作入聲與陸軸宿叶陸德明南人也諸經告字德明皆因此音谷如易瀆則不告之告本只是去聲釋文乃亦音告乃若瀆與句讀之讀同不作去聲大扺北音入聲皆作去聲未嘗以去聲為入聲也詩云侯作侯祝作側慮反今之詛字祝周救反今之咒字也莆陽鄭氏曰鄭康成謂咒為注齊音也周司約注云約言語之約束也約於妙反束詩注反陳平封曲逆侯曲音去逆音遇又如録囚為慮囚安作為安做贖為樹嚼為噍織為志肉為授應吉甫宴射詩過則有失叶韻失音試潘嶽西征賦伯恬靜以無欲叶韻欲音喻皆以入聲作去聲國語云勾踐親為夫差洗馬或作洗音銑今謂洗馬為浴馬誤矣荀子云扶輿洗馬楊倞自導馬也前漢書云太師太傅太保屬官有洗馬洗音銑如淳曰前驅也禮記綸綍之綍即拂字或作勃也左傳蕞爾之蕞言其小也徂外反或讀為撮非也莊子徑庭之庭敕定反敕字閩音為惕賈誼過秦論云招八州而朝同列韓愈諌臣論云招其君之過招字並祈堯反舉也蓋出莊子有虞氏招仁義以撓天下招音翹揭也周虢州亦謂之郭州韓滅而子孫分散江淮間為何氏郭忠恕曰虢郭韓何此隨音而生變也愚謂閩音王為黃越音武為姥吳音余為奚徐為齊杭州人金為斤陰為因齊人雞為賫喫為抉皆鄉音也哉西漢書張騫傳身毒國在大夏東南佛郎國也李奇曰一名天篤則浮屠胡是也顔師古曰今曰天竺蓋身毒聲轉為天竺省文作竺又轉為竹音東漢書浮屠即佛他也伊蒲塞即優婆塞西方之言如此者衆若以華言字面求其義理不可得矣監本略長字上聲丁丈切當作轉西切劉字丁角反當作側角切又如􅀈合之􅀈當作明粉切與泯字同音若作武粉切則與憤字同音矣又與昊珉二字皆音作民若作武巾切則與憤字同音矣毛晃韻略始改正其失書齋夜話卷一
