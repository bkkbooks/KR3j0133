  - {type: page-break, offset: 0, content: '', id: KR3j0133_WYG_000-1a, image: WYG0865/WYG0865-0611a.png}
body:
  text: 提要臣等謹案書齊夜話四卷宋俞琰撰琰有大易集說已著録此書乃其平日讀書論文隨所得而筆記者卷一皆辨論經義其斥孔安國稱洛書錫禹之非確為有見于諸經字訓正訛考異頗為該洽如謂論語富與貴章當就不以其道為句孟子則慕少艾為慕愛少衰之思當讀少字為上聲其說亦頗足資參正二卷三卷皆推闡先儒之說多發明河圖洛書及先天太極二圖蓋陳摶所述以丹訣通之于易其原本出道家琰所注隂符經參同契皆詮釋黃老神仙之說所著席上腐談易外别傅亦研究爐火修煉之術故其注易皆傳邵學是書反覆申明亦不出是義也末一卷皆論文之語然頗乏精奧蓋琰詞章之學不及其易學之深觀所作林居山人集亦可以概見云乾隆五十一年四月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:d6ecc10675ea3abdee542c418a5484fd834b805f0854aa823053b137457693dc
